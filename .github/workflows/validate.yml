name: Validate Plugin Index

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Path filter — only run validation when the index file (or the
  # workflow itself) changes. README edits shouldn't burn CI minutes.
  # ---------------------------------------------------------------------------
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      index: ${{ steps.filter.outputs.index }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            index:
              - 'plugin-index.json'
            workflows:
              - '.github/workflows/**'

  validate:
    needs: [changes]
    if: needs.changes.outputs.index == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON is parseable
        run: python3 -c "import json, sys; json.load(open('plugin-index.json'))" || { echo "Invalid JSON"; exit 1; }

      - name: Check required fields and no duplicates
        run: |
          python3 <<'SCRIPT'
          import json, sys

          with open("plugin-index.json") as f:
              plugins = json.load(f)

          if not isinstance(plugins, list):
              print("ERROR: plugin-index.json must be a JSON array")
              sys.exit(1)

          required_fields = ["owner", "repo", "name", "description", "categories", "featured"]
          seen = set()
          errors = []

          for i, entry in enumerate(plugins):
              for field in required_fields:
                  if field not in entry:
                      errors.append(f"Entry {i}: missing required field '{field}'")

              if "owner" in entry and "repo" in entry:
                  key = f"{entry['owner']}/{entry['repo']}/{entry.get('name','')}"
                  if key in seen:
                      errors.append(f"Entry {i}: duplicate entry '{key}'")
                  seen.add(key)

              if "categories" in entry:
                  if not isinstance(entry["categories"], list) or len(entry["categories"]) == 0:
                      errors.append(f"Entry {i}: 'categories' must be a non-empty array")

              if "featured" in entry and not isinstance(entry["featured"], bool):
                  errors.append(f"Entry {i}: 'featured' must be a boolean")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          print(f"OK: {len(plugins)} plugins validated, {len(seen)} unique repos")
          SCRIPT

  # ---------------------------------------------------------------------------
  # Aggregator — single required status check for branch protection.
  # ---------------------------------------------------------------------------
  ci-all-green:
    name: "CI: all green"
    needs: [changes, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gate jobs succeeded or were skipped
        shell: bash
        run: |
          fail=0
          check() {
            case "$2" in
              success|skipped) echo "  ✓ $1 ($2)" ;;
              *) echo "  ✗ $1 ($2)"; fail=1 ;;
            esac
          }
          echo "Gate job results for commit ${GITHUB_SHA:0:7}:"
          check "changes"  "${{ needs.changes.result }}"
          check "validate" "${{ needs.validate.result }}"
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo ""
          echo "All required CI jobs succeeded or were correctly skipped."
